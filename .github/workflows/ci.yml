name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # Qt must run headlessly; QtWebEngine needs the sandbox disabled and
      # software GL on a display-less runner (the analytics tabs and memo
      # preview embed QWebEngineView).
      QT_QPA_PLATFORM: offscreen
      QT_OPENGL: software
      QTWEBENGINE_DISABLE_SANDBOX: "1"
      QTWEBENGINE_CHROMIUM_FLAGS: "--no-sandbox --disable-gpu"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Qt / QtWebEngine system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libdbus-1-3 libnss3 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcomposite1 libxcursor1 libxdamage1 libxrandr2 \
            libxtst6 libxi6 libasound2 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            fonts-dejavu-core

      - name: Install package (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Tests (pytest, headless)
        run: pytest -q
